<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Next Trace — Premium pet transport tracking for all species. Real-time GPS, wellness monitoring, and certified handlers." />
    <title>Next Trace | Premium Pet Transport & Tracking</title>
    <link rel="icon" type="image/svg+xml" href="/paw-icon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --amber: #F59E0B;
        --amber-light: #FCD34D;
        --amber-dark: #D97706;
        --teal: #0D4B4D;
        --teal-mid: #0F6B6E;
        --teal-light: #14B8A6;
        --cream: #FFF8ED;
        --cream-dark: #FEF3C7;
        --brown: #78350F;
        --text-dark: #1C1917;
        --text-mid: #44403C;
        --text-muted: #78716C;
      }
      body {
        font-family: 'Outfit', sans-serif;
        background-color: var(--cream);
        color: var(--text-dark);
        -webkit-font-smoothing: antialiased;
      }
      @keyframes ping {
        0%,100% { transform: scale(1); opacity: 0.75; }
        50% { transform: scale(1.5); opacity: 0; }
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
